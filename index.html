                    const newChat = { id: 'c' + generateId(), type: 'private', participants: [state.currentUser.phone, phone], unread: {}, pinned: false };
                    state.chats.push(newChat); state.messages[newChat.id] = [];
                    saveState(); renderChatList(); openChat(newChat.id);
                };
                window.startCallWith = (phone) => {
                    closeModal();
                    const chat = state.chats.find(c => c.type === 'private' && c.participants.includes(state.currentUser.phone) && c.participants.includes(phone));
                    if (chat) { openChat(chat.id); setTimeout(() => startCall(false), 500); }
                    else { window.createChatWith(phone); setTimeout(() => startCall(false), 600); }
                };
                window.toggleBlockProfile = (phone) => {
                    if (state.blacklist.includes(phone)) state.blacklist = state.blacklist.filter(p => p !== phone);
                    else state.blacklist.push(phone);
                    saveState(); closeModal(); setTimeout(() => showUserProfile(phone), 200);
                };

                // Обработчики для смены аватара и обложки (только для своего профиля)
                if (isOwn) {
                    setTimeout(() => {
                        document.getElementById('avatarInput')?.addEventListener('change', (e) => {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    state.currentUser.customAvatar = ev.target.result;
                                    state.users[state.currentUser.phone].customAvatar = ev.target.result;
                                    saveState();
                                    closeModal();
                                    setTimeout(() => showUserProfile(state.currentUser.phone), 200);
                                    showToast('Аватар обновлён! 📸', 'success');
                                    renderChatList();
                                    updateChatHeader();
                                };
                                reader.readAsDataURL(file);
                            }
                            e.target.value = '';
                        });

                        document.getElementById('coverInput')?.addEventListener('change', (e) => {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    state.currentUser.coverColor = '#667eea';
                                    state.users[state.currentUser.phone].coverColor = '#667eea';
                                    saveState();
                                    closeModal();
                                    setTimeout(() => showUserProfile(state.currentUser.phone), 200);
                                    showToast('Обложка обновлена! 🎨', 'success');
                                };
                                reader.readAsDataURL(file);
                            }
                            e.target.value = '';
                        });
                    }, 100);
                }
            }

            function showEditProfileModal() {
                const u = state.currentUser;
                const coverColors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#f5576c', '#ff9f43', '#0084ff', '#31a24c'];
                
                const content = `
                    <div class="input-group">
                        <label>👤 Имя</label>
                        <input type="text" id="eName" value="${u.name}" placeholder="Ваше имя">
                    </div>
                    <div class="input-group">
                        <label>@ Username</label>
                        <input type="text" id="eUsername" value="${u.username || ''}" placeholder="my_username">
                        <small style="color:var(--text2);">3-30 символов, только буквы, цифры и _</small>
                    </div>
                    <div class="input-group">
                        <label>💬 Статус</label>
                        <input type="text" id="eStatus" value="${u.status}" placeholder="Ваш статус">
                    </div>
                    <div class="input-group">
                        <label>📝 О себе</label>
                        <textarea id="eBio" rows="3" placeholder="Расскажите о себе...">${u.bio || ''}</textarea>
                    </div>
                    <div class="input-group">
                        <label>📸 Аватар</label>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div class="avatar" style="width:60px;height:60px;font-size:2rem;">
                                ${u.customAvatar ? `<img src="${u.customAvatar}" class="avatar-img" alt="avatar">` : u.avatar}
                            </div>
                            <button class="btn btn-outline btn-sm" onclick="document.getElementById('avatarInputModal').click()">
                                <i class="fas fa-camera"></i> Загрузить фото
                            </button>
                            <input type="file" id="avatarInputModal" style="display:none;" accept="image/*">
                        </div>
                        <p style="margin-top:8px;">Или выберите эмодзи:</p>
                        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
                            ${['😎','🐱','🦊','🐼','🐸','🐧','🦁','🤖','👨','👩','🧑','🦸','🦹','🧙','🧚','🦄'].map(a => `
                                <div class="avatar-option" style="width:40px;height:40px;font-size:1.2rem;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid ${u.avatar === a ? 'var(--blue)' : 'transparent'};" 
                                     onclick="document.querySelectorAll('#emojiAvatars .avatar-option').forEach(e=>e.style.border='2px solid transparent'); this.style.border='2px solid var(--blue)'; window.selectedEmojiAvatar='${a}'">
                                    ${a}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="input-group">
                        <label>🎨 Цвет обложки</label>
                        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
                            ${coverColors.map(c => `
                                <div style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${(u.coverColor || '#667eea') === c ? 'var(--text)' : 'transparent'};transition:all var(--transition-fast);" 
                                     onclick="document.querySelectorAll('#coverColors div').forEach(e=>e.style.border='3px solid transparent'); this.style.border='3px solid var(--text)'; window.selectedCoverColor='${c}'"
                                     title="${c}"></div>
                            `).join('')}
                        </div>
                    </div>
                    <button class="btn btn-primary" id="saveProfileBtn">
                        <i class="fas fa-save"></i> Сохранить изменения
                    </button>
                `;

                const { overlay, closeModal } = showModal('✏️ Редактирование профиля', content);

                window.selectedEmojiAvatar = u.avatar;
                window.selectedCoverColor = u.coverColor || '#667eea';

                // Обработчик загрузки аватара
                setTimeout(() => {
                    document.getElementById('avatarInputModal')?.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                u.customAvatar = ev.target.result;
                                const avatarDiv = overlay.querySelector('.avatar');
                                if (avatarDiv) avatarDiv.innerHTML = `<img src="${ev.target.result}" class="avatar-img" alt="avatar">`;
                            };
                            reader.readAsDataURL(file);
                        }
                        e.target.value = '';
                    });
                }, 100);

                overlay.querySelector('#saveProfileBtn').addEventListener('click', () => {
                    const n = overlay.querySelector('#eName').value.trim();
                    const un = overlay.querySelector('#eUsername').value.trim();
                    if (!n) return showToast('Введите имя', 'error');
                    if (un && !/^[a-zA-Z0-9_]{3,30}$/.test(un)) return showToast('Username: 3-30 символов', 'error');
                    if (un && un !== u.username && Object.values(state.users).some(us => us.phone !== u.phone && us.username === un)) return showToast('Username занят', 'error');

                    u.name = n;
                    u.username = un;
                    u.status = overlay.querySelector('#eStatus').value.trim();
                    u.bio = overlay.querySelector('#eBio').value.trim();
                    u.avatar = window.selectedEmojiAvatar;
                    u.coverColor = window.selectedCoverColor;
                    if (!u.customAvatar) u.customAvatar = null;

                    saveState(); 
                    closeModal(); 
                    render();
                    showToast('Профиль обновлён! ✨', 'success');
                });
            }

            // ========== ПОИСК В ЧАТЕ ==========
            function showSearchMessagesModal() {
                const msgs = (state.messages[state.currentChat] || []).filter(m => !m.deleted);
                const content = `
                    <div class="input-group"><input type="text" id="searchMsgsInput" placeholder="🔍 Поиск в сообщениях..."></div>
                    <div id="searchResults" style="max-height:300px;overflow-y:auto;">
                        ${msgs.map(m => `
                            <div class="user-list-item search-msg-item" data-msg="${m.id}" style="flex-direction:column;align-items:flex-start;">
                                <div style="display:flex;align-items:center;gap:8px;width:100%;">
                                    <span style="font-weight:600;">${state.users[m.sender]?.name || 'Участник'}</span>
                                    <span style="font-size:0.7rem;color:var(--text2);">${formatTime(m.time)}</span>
                                </div>
                                <div style="margin-top:4px;">${m.text.substring(0, 120)}</div>
                            </div>
                        `).join('')}
                    </div>`;
                const { overlay, closeModal } = showModal('🔍 Поиск в чате', content);

                overlay.querySelector('#searchMsgsInput')?.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    overlay.querySelectorAll('.search-msg-item').forEach(item => {
                        item.style.display = item.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
                    });
                });
            }

            // ========== НАСТРОЙКИ ==========
            function showSettingsModal() {
                const content = `
                    <div class="tab-nav">
                        <button class="tab-btn active" data-tab="notifications">🔔 Уведомления</button>
                        <button class="tab-btn" data-tab="privacy">🔒 Приватность</button>
                        <button class="tab-btn" data-tab="appearance">🎨 Оформление</button>
                        <button class="tab-btn" data-tab="blacklist">🚫 Чёрный список</button>
                    </div>

                    <div id="tabNotifications" class="tab-content active">
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-bell"></i> Уведомления</span>
                            <label class="switch"><input type="checkbox" ${state.settings.notifications?'checked':''} id="sNotif"><span class="slider"></span></label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-volume-up"></i> Звук</span>
                            <label class="switch"><input type="checkbox" ${state.settings.sound?'checked':''} id="sSound"><span class="slider"></span></label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-mobile-alt"></i> Вибрация</span>
                            <label class="switch"><input type="checkbox" ${state.settings.vibration?'checked':''} id="sVib"><span class="slider"></span></label>
                        </div>
                    </div>

                    <div id="tabPrivacy" class="tab-content" style="display:none;">
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-clock"></i> Последний вход</span>
                            <label class="switch"><input type="checkbox" ${state.settings.privacy.lastSeen?'checked':''} id="sLastSeen"><span class="slider"></span></label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-check-double"></i> Отчёты о прочтении</span>
                            <label class="switch"><input type="checkbox" ${state.settings.privacy.readReceipts?'checked':''} id="sRead"><span class="slider"></span></label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-phone-alt"></i> Принимать звонки</span>
                            <label class="switch"><input type="checkbox" ${state.settings.privacy.allowCalls?'checked':''} id="sCalls"><span class="slider"></span></label>
                        </div>
                    </div>

                    <div id="tabAppearance" class="tab-content" style="display:none;">
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-text-height"></i> Размер шрифта</span>
                            <select id="sFontSize" style="padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);">
                                <option value="small" ${state.settings.appearance.fontSize==='small'?'selected':''}>Маленький</option>
                                <option value="medium" ${state.settings.appearance.fontSize==='medium'?'selected':''}>Средний</option>
                                <option value="large" ${state.settings.appearance.fontSize==='large'?'selected':''}>Большой</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-gauge-high"></i> Скорость анимаций</span>
                            <select id="sAnimSpeed" style="padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);">
                                <option value="slow" ${state.settings.appearance.animationSpeed==='slow'?'selected':''}>Медленно</option>
                                <option value="normal" ${state.settings.appearance.animationSpeed==='normal'?'selected':''}>Нормально</option>
                                <option value="fast" ${state.settings.appearance.animationSpeed==='fast'?'selected':''}>Быстро</option>
                            </select>
                        </div>
                    </div>

                    <div id="tabBlacklist" class="tab-content" style="display:none;">
                        ${state.blacklist.length === 0 ? '<p style="text-align:center;color:var(--text2);padding:20px;">Список пуст</p>' : 
                            state.blacklist.map(p => {
                                const u = state.users[p];
                                return `
                                    <div class="user-list-item">
                                        <div class="avatar" style="width:36px;height:36px;font-size:1rem;">${u?.avatar||'🚫'}</div>
                                        <div style="flex:1;">${u?.name||p} ${u?.username?'@'+u.username:''}</div>
                                        <button class="btn btn-xs btn-outline" data-unblock="${p}">Разблокировать</button>
                                    </div>`;
                            }).join('')
                        }
                        <div class="input-group" style="margin-top:14px;">
                            <label>Заблокировать пользователя</label>
                            <input type="text" id="blockInput" placeholder="@username или номер телефона">
                        </div>
                        <button class="btn btn-danger btn-sm" id="blockUserBtn"><i class="fas fa-ban"></i> Заблокировать</button>
                    </div>

                    <button class="btn btn-primary" style="margin-top:18px;" id="saveSettingsBtn">
                        <i class="fas fa-save"></i> Сохранить все настройки
                    </button>
                `;

                const { overlay, closeModal } = showModal('⚙️ Настройки', content, { wide: true });

                // Табы
                overlay.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        overlay.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        overlay.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
                        const tab = overlay.querySelector('#tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1));
                        if (tab) tab.style.display = 'block';
                    });
                });

                // Разблокировка
                overlay.querySelectorAll('[data-unblock]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        state.blacklist = state.blacklist.filter(p => p !== btn.dataset.unblock);
                        saveState(); closeModal(); showSettingsModal();
                    });
                });

                // Блокировка
                overlay.querySelector('#blockUserBtn')?.addEventListener('click', () => {
                    const input = overlay.querySelector('#blockInput').value.trim();
                    if (!input) return showToast('Введите username или телефон', 'error');
                    let found = null;
                    if (input.startsWith('@')) { const u = Object.values(state.users).find(u => u.username === input.substring(1)); if (u) found = u.phone; }
                    else if (state.users[input]) found = input;
                    if (!found) return showToast('Пользователь не найден', 'error');
                    if (found === state.currentUser.phone) return showToast('Нельзя заблокировать себя', 'error');
                    if (state.blacklist.includes(found)) return showToast('Уже в чёрном списке', 'warning');
                    state.blacklist.push(found); saveState(); closeModal(); showSettingsModal();
                });

                // Сохранение
                overlay.querySelector('#saveSettingsBtn').addEventListener('click', () => {
                    state.settings.notifications = overlay.querySelector('#sNotif')?.checked ?? true;
                    state.settings.sound = overlay.querySelector('#sSound')?.checked ?? true;
                    state.settings.vibration = overlay.querySelector('#sVib')?.checked ?? false;
                    state.settings.privacy.lastSeen = overlay.querySelector('#sLastSeen')?.checked ?? true;
                    state.settings.privacy.readReceipts = overlay.querySelector('#sRead')?.checked ?? true;
                    state.settings.privacy.allowCalls = overlay.querySelector('#sCalls')?.checked ?? true;
                    state.settings.appearance.fontSize = overlay.querySelector('#sFontSize')?.value || 'medium';
                    state.settings.appearance.animationSpeed = overlay.querySelector('#sAnimSpeed')?.value || 'normal';
                    
                    saveState();
                    applyAppearanceSettings();
                    closeModal();
                    showToast('Настройки сохранены! ✨', 'success');
                });
            }

            function showChatInfoModal() {
                if (!state.currentChat) return;
                const chat = state.chats.find(c => c.id === state.currentChat);
                if (!chat) return;
                const msgs = (state.messages[chat.id] || []).filter(m => !m.deleted);

                const content = `
                    <div style="text-align:center;margin-bottom:20px;">
                        <div class="avatar" style="width:72px;height:72px;font-size:2.5rem;margin:0 auto;">${chat.avatar || '👤'}</div>
                        <h3 style="margin-top:12px;">${chat.name || 'Личный чат'}</h3>
                        <p style="color:var(--text2);">${chat.type === 'channel' ? '📢 Канал' : chat.type === 'group' ? '👥 Группа' : '💬 Личный чат'}</p>
                        ${chat.description ? `<p style="margin-top:8px;">${chat.description}</p>` : ''}
                    </div>
                    <div class="stats-row">
                        <div class="stat-item"><div class="stat-value">${msgs.length}</div><div class="stat-label">Сообщений</div></div>
                        <div class="stat-item"><div class="stat-value">${msgs.filter(m=>m.type!=='text').length}</div><div class="stat-label">Медиа</div></div>
                        <div class="stat-item"><div class="stat-value">${chat.participants.length}</div><div class="stat-label">Участников</div></div>
                    </div>
                    <h4 style="margin-bottom:10px;">👥 Участники:</h4>
                    ${chat.participants.map(p => {
                        const u = state.users[p];
                        return `<div class="user-list-item" onclick="document.getElementById('modalCloseBtn').click(); window.showUserProfile('${p}')">
                            <div class="avatar" style="width:36px;height:36px;font-size:1rem;">${u?.avatar||'👤'}</div>
                            <div style="flex:1;">${u?.name||'Участник'} ${chat.admin===p?' 👑':''} ${u?.username?'<span style="color:var(--blue);">@'+u.username+'</span>':''}</div>
                        </div>`;
                    }).join('')}
                    <div style="margin-top:18px;display:flex;gap:8px;">
                        <button class="btn btn-danger btn-sm" id="delChatBtn"><i class="fas fa-trash-alt"></i> Удалить чат</button>
                        <button class="btn btn-outline btn-sm" id="clearChatBtn"><i class="fas fa-broom"></i> Очистить историю</button>
                    </div>`;
                const { overlay, closeModal } = showModal('ℹ️ Информация о чате', content);
                overlay.querySelector('#delChatBtn').addEventListener('click', () => { closeModal(); deleteChat(state.currentChat); });
                overlay.querySelector('#clearChatBtn').addEventListener('click', () => { closeModal(); clearChatHistory(state.currentChat); });
            }

            function showCreateModal(type) {
                const titles = { private: '💬 Новый чат', group: '👥 Новая группа', channel: '📢 Новый канал' };
                const sel = new Set();
                const contacts = Object.values(state.users).filter(u => u.phone !== state.currentUser.phone && !state.blacklist.includes(u.phone));

                const content = `
                    ${type !== 'private' ? `
                        <div class="input-group"><label>Название</label><input type="text" id="grName" placeholder="${type==='group'?'Название группы':'Название канала'}"></div>
                        <div class="input-group"><label>Аватар</label>
                            <select id="grAvatar" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);">
                                <option value="👥">👥 Группа</option><option value="📢">📢 Канал</option>
                                <option value="💼">💼 Работа</option><option value="🎮">🎮 Игры</option><option value="📚">📚 Учёба</option>
                            </select>
                        </div>
                    ` : ''}
                    <div class="input-group"><input type="text" id="cSearch" placeholder="🔍 Поиск контактов..."></div>
                    <div id="cList" style="max-height:250px;overflow-y:auto;">
                        ${contacts.map(c => `
                            <div class="user-list-item csel" data-phone="${c.phone}">
                                <div class="avatar" style="width:36px;height:36px;font-size:1rem;">${c.avatar}</div>
                                <div style="flex:1;">${c.name} <span style="color:var(--blue);">@${c.username||'нет'}</span></div>
                                <i class="fas fa-check-circle" style="display:none;color:var(--green);"></i>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-primary" style="margin-top:14px;" id="confCreate">✨ Создать</button>
                `;

                const { overlay, closeModal } = showModal(titles[type], content);

                overlay.querySelector('#cSearch')?.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    overlay.querySelectorAll('.csel').forEach(i => i.style.display = i.textContent.toLowerCase().includes(q) ? 'flex' : 'none');
                });

                overlay.querySelectorAll('.csel').forEach(item => {
                    item.addEventListener('click', () => {
                        const phone = item.dataset.phone;
                        if (type === 'private') {
                            overlay.querySelectorAll('.csel').forEach(i => {
                                i.style.background = '';
                                i.querySelector('i').style.display = 'none';
                            });
                            sel.clear();
                        }
                        if (sel.has(phone)) {
                            sel.delete(phone);
                            item.style.background = '';
                            item.querySelector('i').style.display = 'none';
                        } else {
                            sel.add(phone);
                            item.style.background = 'var(--bg3)';
                            item.querySelector('i').style.display = 'block';
                        }
                    });
                });

                overlay.querySelector('#confCreate').addEventListener('click', () => {
                    if (sel.size === 0) return showToast('Выберите хотя бы один контакт', 'error');
                    const name = type !== 'private' ? (overlay.querySelector('#grName')?.value?.trim() || (type === 'group' ? 'Новая группа' : 'Новый канал')) : null;
                    const avatar = type !== 'private' ? overlay.querySelector('#grAvatar')?.value || '👥' : state.users[Array.from(sel)[0]]?.avatar || '👤';
                    const newChat = {
                        id: 'c' + generateId(), type, name, avatar, description: '',
                        participants: [state.currentUser.phone, ...Array.from(sel)],
                        admin: type !== 'private' ? state.currentUser.phone : null,
                        unread: {}, pinned: false
                    };
                    state.chats.push(newChat);
                    state.messages[newChat.id] = [];
                    
                    if (type !== 'private') {
                        state.messages[newChat.id].push({
                            id: generateId(), sender: state.currentUser.phone,
                            text: `🎉 ${type === 'group' ? 'Группа' : 'Канал'} "${name}" создан${type === 'channel' ? '. Только администратор может писать.' : ''}`,
                            time: Date.now(), type: 'text', deleted: false
                        });
                    }
                    
                    saveState(); closeModal(); renderChatList(); openChat(newChat.id);
                    showToast(`${type === 'group' ? 'Группа' : type === 'channel' ? 'Канал' : 'Чат'} создан! 🎉`, 'success');
                });
            }

            // ========== GLOBAL ==========
            window.showUserProfile = showUserProfile;
            window.showToast = showToast;
            window.confirmDeleteMsg = (id) => { if (confirm('Удалить сообщение?')) deleteMessage(id); };
            window.openChatById = (id) => openChat(id);
            window.createChatWith = (phone) => {
                const existing = state.chats.find(c => c.type === 'private' && c.participants.includes(state.currentUser.phone) && c.participants.includes(phone));
                if (existing) { openChat(existing.id); return; }
                const newChat = { id: 'c' + generateId(), type: 'private', participants: [state.currentUser.phone, phone], unread: {}, pinned: false };
                state.chats.push(newChat); state.messages[newChat.id] = [];
                saveState(); renderChatList(); openChat(newChat.id);
            };

            init();

            window.addEventListener('beforeunload', () => {
                if (state.currentCall) endCall();
                if (state.currentUser) { state.currentUser.online = false; state.currentUser.lastSeen = Date.now(); saveState(); }
            });

            console.log('🔥 KChat Pro v2 | Плавные анимации + Полная настройка профиля | ГОТОВО!');
        })();
    </script>
</body>
</html>
