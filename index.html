<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KChat • Поиск работает</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
        :root {
            --bg:#fff; --bg2:#f0f2f5; --bg3:#f7f9fc; --text:#1a1a1a; --text2:#65676b;
            --blue:#0084ff; --green:#31a24c; --red:#ff4444; --orange:#ff9f43;
            --bubble-in:#e4e6eb; --bubble-out:#0084ff; --border:#dadde1;
        }
        body.dark { --bg:#1a1a1a; --bg2:#0a0a0a; --bg3:#2a2a2a; --text:#e4e6eb; --text2:#b0b3b8; --bubble-in:#3a3b3c; --border:#3e4042; }
        body { width:100vw; height:100vh; overflow:hidden; background:var(--bg2); color:var(--text); font-size:15px; }
        #app { width:100%; height:100%; display:flex; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes scaleIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
        @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .auth-screen { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea,#764ba2); padding:16px; }
        .auth-card { background:var(--bg); border-radius:24px; padding:28px; width:100%; max-width:400px; box-shadow:0 16px 40px rgba(0,0,0,0.25); animation:scaleIn 0.4s ease; }
        .auth-card h1 { text-align:center; font-size:2rem; background:linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .input-group { margin-bottom:12px; }
        .input-group label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:4px; color:var(--text2); }
        .input-group input { width:100%; padding:14px; border:2px solid var(--border); border-radius:12px; font-size:1rem; background:var(--bg3); color:var(--text); outline:none; }
        .input-group input:focus { border-color:var(--blue); }
        .btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px; }
        .btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); color:white; }
        .btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }

        .main-layout { display:flex; width:100%; height:100%; }
        .sidebar { width:380px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
        .sidebar-header { padding:14px; border-bottom:1px solid var(--border); }
        .profile-bar { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:10px; border-radius:14px; cursor:pointer; }
        .profile-bar:hover { background:var(--bg3); }
        .avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; font-size:1.4rem; color:white; flex-shrink:0; }
        .profile-info { flex:1; }
        .profile-name { font-weight:700; }
        .profile-username { font-size:0.8rem; color:var(--blue); }
        .action-btns { display:flex; gap:8px; margin-bottom:10px; }
        .action-btn { flex:1; padding:10px; border:none; border-radius:10px; background:var(--bg3); color:var(--text); cursor:pointer; font-size:0.82rem; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px; }
        .action-btn:hover { background:var(--blue); color:white; }
        .search-box { display:flex; align-items:center; background:var(--bg3); border-radius:24px; padding:10px 14px; gap:8px; border:1px solid var(--border); }
        .search-box input { flex:1; background:none; border:none; outline:none; font-size:0.95rem; color:var(--text); }
        .chat-list { flex:1; overflow-y:auto; padding:6px; }
        .chat-item { display:flex; align-items:center; gap:10px; padding:12px; border-radius:14px; cursor:pointer; transition:0.2s; margin-bottom:3px; }
        .chat-item:hover { background:var(--bg3); }
        .chat-item.active { background:var(--blue); color:white; }
        .chat-item-info { flex:1; min-width:0; }
        .chat-item-name { font-weight:600; }
        .chat-item-msg { font-size:0.8rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .unread-badge { background:var(--blue); color:white; border-radius:10px; padding:2px 7px; font-size:0.7rem; font-weight:600; margin-left:4px; }

        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--bg2); }
        .chat-header { padding:12px 16px; background:var(--bg); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
        .chat-title { flex:1; font-weight:700; }
        .chat-subtitle { font-size:0.78rem; color:var(--text2); }
        .icon-btn { width:38px; height:38px; border-radius:50%; border:none; background:var(--bg3); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; }
        .icon-btn:hover { background:var(--blue); color:white; }
        .messages-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:6px; }
        .msg { display:flex; max-width:72%; animation:msgIn 0.3s; }
        .msg.in { align-self:flex-start; }
        .msg.out { align-self:flex-end; }
        .msg-bubble { padding:10px 14px; border-radius:18px; word-break:break-word; }
        .msg.in .msg-bubble { background:var(--bubble-in); color:var(--text); }
        .msg.out .msg-bubble { background:var(--bubble-out); color:white; }
        .msg-sender { font-size:0.7rem; margin-bottom:2px; color:var(--blue); font-weight:600; }
        .msg-time { font-size:0.65rem; opacity:0.7; margin-top:3px; text-align:right; }
        .input-bar { padding:12px 16px; background:var(--bg); border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; }
        .input-bar input { flex:1; padding:12px 16px; border:2px solid var(--border); border-radius:24px; font-size:1rem; background:var(--bg3); color:var(--text); outline:none; }
        .input-bar input:focus { border-color:var(--blue); }
        .empty-state { text-align:center; padding:50px; color:var(--text2); }

        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:1000; padding:16px; }
        .modal { background:var(--bg); border-radius:20px; padding:24px; width:100%; max-width:460px; max-height:80vh; overflow-y:auto; animation:scaleIn 0.3s; }
        .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .modal-header h3 { font-size:1.1rem; }
        .modal-close { width:32px; height:32px; border-radius:50%; border:none; background:var(--bg3); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .modal-close:hover { background:var(--red); color:white; }
        .user-list-item { display:flex; align-items:center; gap:12px; padding:12px; border-radius:12px; cursor:pointer; transition:0.2s; }
        .user-list-item:hover { background:var(--bg3); }

        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:var(--bg); border-radius:12px; padding:14px 20px; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:2000; border-left:4px solid var(--blue); font-size:0.9rem; animation:slideUp 0.3s; }
        .toast.success { border-left-color:var(--green); }
        .toast.error { border-left-color:var(--red); }

        @media (max-width:768px) {
            .sidebar { width:100%; }
            .msg { max-width:85%; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            const SERVER_URL = 'https://kchat-server-h3f8.onrender.com';
            let socket = null;
            try { socket = io(SERVER_URL); console.log('🟢 Подключение к серверу...'); } catch(e) { console.log('Сервер недоступен'); }

            const STORAGE_KEY = 'kchat_v7';
            const DEMO_CODE = '12345';

            const state = {
                user: null,
                allUsers: [],
                chats: [],
                messages: {},
                currentChat: null,
                theme: 'light',
                settings: { notifications: true, sound: true }
            };

            function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
            function toast(msg, type='info') { const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
            function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,6); }
            function fTime(ts) { const d=new Date(ts); if(d.toDateString()===new Date().toDateString()) return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); return d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'}); }
            function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.remove()); }

            function init() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) { try { const d=JSON.parse(saved); state.chats=d.chats||[]; state.messages=d.messages||{}; state.theme=d.theme||'light'; } catch(e) {} }
                if (state.theme==='dark') document.body.classList.add('dark');

                if (socket) {
                    socket.on('connect', () => { if (state.user) registerOnServer(); });

                    // Получаем список ВСЕХ пользователей с сервера
                    socket.on('users:update', users => {
                        state.allUsers = users;
                        console.log('👥 Пользователи обновлены:', users.length);
                    });

                    // Результаты поиска
                    socket.on('user:searchResults', results => {
                        window._searchResults = results;
                        renderSearchResults(results);
                    });

                    // Получаем личные сообщения
                    socket.on('message:private', data => {
                        if (!state.messages[data.chatId]) state.messages[data.chatId] = [];
                        state.messages[data.chatId].push({
                            id: genId(), sender: data.fromPhone,
                            text: data.text, time: data.time, type: 'text', deleted: false,
                            senderName: data.fromName, senderUsername: data.fromUsername
                        });
                        const chat = state.chats.find(c => c.id === data.chatId);
                        if (chat && state.user) chat.unread[state.user.phone] = (chat.unread[state.user.phone]||0)+1;
                        save();
                        if (state.currentChat === data.chatId) renderMessages();
                        renderChatList();
                    });
                }

                render();
            }

            function registerOnServer() {
                if (socket && state.user) {
                    socket.emit('register', {
                        phone: state.user.phone,
                        name: state.user.name,
                        username: state.user.username,
                        avatar: state.user.avatar
                    });
                }
            }

            function render() {
                document.getElementById('app').innerHTML = state.user ? renderMain() : renderAuth();
                if (state.user) {
                    attachMain();
                    renderChatList();
                    if (state.currentChat) openChat(state.currentChat);
                } else {
                    attachAuth();
                }
            }

            function renderAuth() {
                return `<div class="auth-screen"><div class="auth-card"><h1>KChat</h1><p style="text-align:center;color:var(--text2);margin-bottom:16px;">Поиск по @username работает!</p>
                <div id="s1"><div class="input-group"><label>📱 Номер телефона</label><input type="tel" id="phoneInput" value="+79001234567"></div><button class="btn btn-primary" id="sendCode">📱 Получить код</button><button class="btn btn-outline" id="devLogin">⚡ Быстрый вход</button></div>
                <div id="s2" style="display:none;"><p style="text-align:center;">Код: <b>${DEMO_CODE}</b></p><div class="input-group"><label>🔐 Код</label><input type="text" id="codeInput" placeholder="12345" maxlength="5"></div><button class="btn btn-primary" id="verifyCode">✅ Войти</button></div>
                <div id="s3" style="display:none;"><div class="input-group"><label>👤 Имя</label><input type="text" id="nameInput" placeholder="Ваше имя"></div><div class="input-group"><label>@ Username (уникальный)</label><input type="text" id="usernameInput" placeholder="username" autocapitalize="none"></div><button class="btn btn-primary" id="register">🚀 Зарегистрироваться</button></div></div></div>`;
            }

            function attachAuth() {
                let phoneVal='';
                document.getElementById('sendCode')?.addEventListener('click',()=>{ phoneVal=document.getElementById('phoneInput').value.trim(); if(!phoneVal) return toast('Введите номер','error'); document.getElementById('s1').style.display='none'; document.getElementById('s2').style.display='block'; });
                document.getElementById('devLogin')?.addEventListener('click',()=>loginUser(document.getElementById('phoneInput').value.trim()||'+79001234567'));
                document.getElementById('verifyCode')?.addEventListener('click',()=>{ if(document.getElementById('codeInput').value.trim()!==DEMO_CODE) return toast('Код: 12345','error'); const p=phoneVal||document.getElementById('phoneInput').value.trim(); loginUser(p); });
                document.getElementById('register')?.addEventListener('click',()=>{
                    const name=document.getElementById('nameInput').value.trim(), username=document.getElementById('usernameInput').value.trim(), phone=phoneVal||document.getElementById('phoneInput').value.trim();
                    if(!name) return toast('Введите имя','error');
                    if(!username||!/^[a-zA-Z0-9_]{3,30}$/.test(username)) return toast('Username: 3-30 латинских букв/цифр','error');

                    state.user = { phone, name, username, avatar: '😎', status: 'В сети', bio: '' };
                    state.chats = [];
                    state.messages = {};
                    save();
                    registerOnServer();
                    render();
                    toast(`Добро пожаловать, @${username}! Найдите друзей через поиск 🔍`, 'success');
                });
            }

            function loginUser(phone) {
                state.user = {
                    phone: phone,
                    name: phone === '+79001234567' ? 'Александр' : phone === '+79161112233' ? 'Мария' : phone === '+79262223344' ? 'Дмитрий' : phone === '+79363334455' ? 'Елена' : 'Пользователь',
                    username: phone === '+79001234567' ? 'alex' : phone === '+79161112233' ? 'maria' : phone === '+79262223344' ? 'dima' : phone === '+79363334455' ? 'elena' : 'user',
                    avatar: phone === '+79001234567' ? '😎' : phone === '+79161112233' ? '👩' : phone === '+79262223344' ? '👨' : phone === '+79363334455' ? '👩' : '👤',
                    status: 'В сети', bio: ''
                };
                if (!state.chats.some(c => c.id === 'bot')) {
                    state.chats.push({ id: 'bot', type: 'private', participants: [phone, '+79991112233'], unread: {}, pinned: false });
                    state.messages['bot'] = [{ id: genId(), sender: '+79991112233', text: 'Привет! Используй 🔍 Поиск чтобы найти людей по @username!', time: Date.now(), type: 'text', deleted: false }];
                }
                save();
                registerOnServer();
                render();
            }

            function renderMain() {
                const u = state.user;
                return `<div class="main-layout">
                    <div class="sidebar"><div class="sidebar-header">
                        <div class="profile-bar"><div class="avatar">${u.avatar}</div><div class="profile-info"><div class="profile-name">${u.name}</div><div class="profile-username">@${u.username}</div></div></div>
                        <div class="action-btns"><button class="action-btn" id="searchBtn"><i class="fas fa-search"></i> Поиск людей</button></div>
                        <div class="search-box"><i class="fas fa-search" style="color:var(--text2);"></i><input type="text" id="searchChats" placeholder="Поиск чатов..."></div>
                    </div><div class="chat-list" id="chatList"></div></div>
                    <div class="chat-area"><div class="chat-header">
                        <div class="avatar" id="chatAvatar" style="width:36px;height:36px;font-size:1rem;">💬</div>
                        <div style="flex:1;"><div class="chat-title" id="chatName">Выберите чат</div><div class="chat-subtitle" id="chatStatus"></div></div>
                        <button class="icon-btn" id="themeBtn"><i class="fas ${state.theme==='dark'?'fa-sun':'fa-moon'}"></i></button>
                        <button class="icon-btn" id="logoutBtn" style="color:var(--red);"><i class="fas fa-sign-out-alt"></i></button>
                    </div><div class="messages-area" id="messagesArea"><div class="empty-state">👈 Выберите чат</div></div>
                    <div class="input-bar"><input type="text" id="msgInput" placeholder="Сообщение..." autocomplete="off"><button class="icon-btn" id="sendMsg" style="background:var(--blue);color:white;"><i class="fas fa-paper-plane"></i></button></div></div></div>`;
            }

            function attachMain() {
                document.getElementById('searchBtn')?.addEventListener('click', showSearchModal);
                document.getElementById('themeBtn')?.addEventListener('click',()=>{ state.theme=state.theme==='light'?'dark':'light'; document.body.classList.toggle('dark'); save(); });
                document.getElementById('logoutBtn')?.addEventListener('click',()=>{ state.user=null; state.currentChat=null; save(); render(); });

                const send = () => {
                    const inp=document.getElementById('msgInput'), text=inp.value.trim();
                    if(!text||!state.currentChat) return;
                    const chat=state.chats.find(c=>c.id===state.currentChat); if(!chat) return;
                    const msg = { id:genId(), sender:state.user.phone, text, time:Date.now(), type:'text', deleted:false };
                    if(!state.messages[chat.id]) state.messages[chat.id]=[];
                    state.messages[chat.id].push(msg);

                    // ОТПРАВКА ЧЕРЕЗ СЕРВЕР
                    if(socket && chat.type==='private') {
                        const other = chat.participants.find(p=>p!==state.user.phone);
                        if(other) socket.emit('message:send', { to:other, chatId:chat.id, text });
                    }

                    // Бот
                    if(chat.participants.includes('+79991112233')) {
                        setTimeout(()=>{
                            state.messages[chat.id].push({ id:genId(), sender:'+79991112233', text:['👍','Интересно!','Понял','Ищи людей через поиск 🔍'][Math.floor(Math.random()*4)], time:Date.now(), type:'text', deleted:false });
                            save(); if(state.currentChat===chat.id) renderMessages(); renderChatList();
                        }, 800);
                    }

                    save(); renderMessages(); renderChatList(); inp.value='';
                };
                document.getElementById('sendMsg')?.addEventListener('click', send);
                document.getElementById('msgInput')?.addEventListener('keypress', e => { if(e.key==='Enter') send(); });
            }

            // ====== ПОИСК (РАБОТАЕТ 100%) ======
            function showSearchModal() {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                    <div class="modal">
                        <div class="modal-header"><h3>🔍 Поиск людей</h3><button class="modal-close" id="mc">✕</button></div>
                        <div class="input-group"><input type="text" id="searchInput" placeholder="Введите @username" autocapitalize="none" autofocus></div>
                        <p style="color:var(--text2);font-size:0.8rem;margin-bottom:8px;">Например: maria, alex, dima, elena, bot</p>
                        <div id="searchResults" style="max-height:50vh;overflow-y:auto;">
                            <p style="color:var(--text2);text-align:center;padding:16px;">Введите username для поиска</p>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);

                const close = () => overlay.remove();
                overlay.querySelector('#mc').addEventListener('click', close);
                overlay.addEventListener('click', e => { if(e.target===overlay) close(); });

                const input = overlay.querySelector('#searchInput');
                input.focus();

                // Живой поиск при вводе
                input.addEventListener('input', function() {
                    const q = this.value.trim().toLowerCase().replace('@', '');
                    const res = overlay.querySelector('#searchResults');
                    
                    if (!q) {
                        res.innerHTML = '<p style="color:var(--text2);text-align:center;padding:16px;">Введите @username для поиска</p>';
                        return;
                    }

                    // Ищем среди ВСЕХ пользователей (кроме себя)
                    const allUsers = state.allUsers.length > 0 ? state.allUsers : [
                        { phone:'+79991112233', name:'🤖 Бот', username:'bot', avatar:'🤖', online:true },
                        { phone:'+79161112233', name:'Мария', username:'maria', avatar:'👩', online:true },
                        { phone:'+79262223344', name:'Дмитрий', username:'dima', avatar:'👨', online:false },
                        { phone:'+79363334455', name:'Елена', username:'elena', avatar:'👩', online:true },
                    ];

                    const found = allUsers.filter(u => {
                        if (state.user && u.phone === state.user.phone) return false;
                        return (u.username?.toLowerCase().includes(q) || u.name?.toLowerCase().includes(q));
                    });

                    if (found.length === 0) {
                        res.innerHTML = `<p style="color:var(--text2);text-align:center;padding:16px;">❌ Никого не найдено</p><p style="color:var(--text2);text-align:center;">Попробуйте: <b>maria, alex, dima, elena, bot</b></p>`;
                        return;
                    }

                    res.innerHTML = found.map(u => `
                        <div class="user-list-item" data-phone="${u.phone}" style="padding:14px;cursor:pointer;">
                            <div class="avatar" style="width:48px;height:48px;font-size:1.5rem;">${u.avatar}</div>
                            <div style="flex:1;">
                                <div style="font-weight:600;">${u.name}</div>
                                <div style="color:var(--blue);">@${u.username}</div>
                            </div>
                            <span>${u.online ? '🟢' : '⚫'}</span>
                        </div>
                    `).join('');

                    // КЛИК ПО РЕЗУЛЬТАТУ
                    res.querySelectorAll('.user-list-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const phone = this.dataset.phone;
                            console.log('🔍 Нажали на:', phone, state.allUsers.find(u=>u.phone===phone)?.username);
                            startChatWithUser(phone);
                            close();
                        });
                    });
                });

                // Также запрашиваем с сервера
                if (socket) {
                    input.addEventListener('input', function() {
                        const q = this.value.trim();
                        if (q.length >= 1) socket.emit('user:search', q);
                    });
                }

                // Обработчик ответа от сервера
                window._renderSearchResults = function(results) {
                    const res = overlay.querySelector('#searchResults');
                    if (!res) return;
                    if (results.length === 0) return;
                    res.innerHTML = results.map(u => `
                        <div class="user-list-item" data-phone="${u.phone}" style="padding:14px;cursor:pointer;">
                            <div class="avatar" style="width:48px;height:48px;font-size:1.5rem;">${u.avatar}</div>
                            <div style="flex:1;"><div style="font-weight:600;">${u.name}</div><div style="color:var(--blue);">@${u.username}</div></div>
                            <span>${u.online?'🟢':'⚫'}</span>
                        </div>
                    `).join('');
                    res.querySelectorAll('.user-list-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const phone = this.dataset.phone;
                            startChatWithUser(phone);
                            close();
                        });
                    });
                };
            }

            function startChatWithUser(phone) {
                if (!state.user) return toast('Войдите в аккаунт', 'error');
                
                // Находим пользователя
                const allUsers = state.allUsers.length > 0 ? state.allUsers : [
                    { phone:'+79991112233', name:'🤖 Бот', username:'bot', avatar:'🤖', online:true },
                    { phone:'+79161112233', name:'Мария', username:'maria', avatar:'👩', online:true },
                    { phone:'+79262223344', name:'Дмитрий', username:'dima', avatar:'👨', online:false },
                    { phone:'+79363334455', name:'Елена', username:'elena', avatar:'👩', online:true },
                ];
                
                const otherUser = allUsers.find(u => u.phone === phone);
                if (!otherUser) return toast('Пользователь не найден', 'error');

                // Проверяем существующий чат
                const exist = state.chats.find(c =>
                    c.type === 'private' &&
                    c.participants.includes(state.user.phone) &&
                    c.participants.includes(phone)
                );

                if (exist) {
                    toast(`Чат с @${otherUser.username} уже есть`, 'info');
                    openChat(exist.id);
                    return;
                }

                // Создаём новый чат
                const newChat = {
                    id: 'chat_' + genId(),
                    type: 'private',
                    participants: [state.user.phone, phone],
                    unread: {},
                    pinned: false
                };

                state.chats.push(newChat);
                state.messages[newChat.id] = [{
                    id: genId(),
                    sender: state.user.phone,
                    text: `👋 Привет, @${otherUser.username}! Давай общаться!`,
                    time: Date.now(),
                    type: 'text',
                    deleted: false
                }];

                save();
                renderChatList();
                openChat(newChat.id);
                toast(`✅ Чат с @${otherUser.username} создан! Отправьте сообщение.`, 'success');
            }

            function renderChatList() {
                const ctr = document.getElementById('chatList');
                if (!ctr || !state.user) return;
                const up = state.user.phone;
                let chats = state.chats.filter(c => c.participants.includes(up));
                ctr.innerHTML = chats.map(c => {
                    const other = c.participants.find(p => p !== up);
                    const u = state.allUsers.find(x => x.phone === other) || { name: 'Контакт', avatar: '👤', username: '' };
                    const msgs = (state.messages[c.id] || []).filter(m => !m.deleted);
                    const last = msgs[msgs.length - 1];
                    return `<div class="chat-item ${c.id===state.currentChat?'active':''}" data-chat="${c.id}">
                        <div class="avatar" style="width:44px;height:44px;font-size:1.3rem;">${u.avatar}</div>
                        <div class="chat-item-info"><div class="chat-item-name">${u.name}</div>
                        <div class="chat-item-msg">${last?last.text.substring(0,25):'Нет сообщений'}${c.unread[up]?`<span class="unread-badge">${c.unread[up]}</span>`:''}</div></div></div>`;
                }).join('');
                ctr.querySelectorAll('.chat-item').forEach(i => i.addEventListener('click', () => openChat(i.dataset.chat)));
            }

            function openChat(chatId) {
                state.currentChat = chatId;
                const chat = state.chats.find(c => c.id === chatId);
                if (!chat || !state.user) return;
                chat.unread[state.user.phone] = 0;
                const other = chat.participants.find(p => p !== state.user.phone);
                const u = state.allUsers.find(x => x.phone === other) || { name: 'Контакт', avatar: '👤' };
                document.getElementById('chatAvatar').textContent = u.avatar;
                document.getElementById('chatName').textContent = u.name;
                document.getElementById('chatStatus').textContent = '';
                renderMessages();
                renderChatList();
                save();
            }

            function renderMessages() {
                const ctr = document.getElementById('messagesArea');
                if (!ctr || !state.currentChat) return;
                const msgs = (state.messages[state.currentChat] || []).filter(m => !m.deleted);
                if (msgs.length === 0) { ctr.innerHTML = '<div class="empty-state">Нет сообщений. Напишите первое!</div>'; return; }
                ctr.innerHTML = msgs.map(m => {
                    const isMe = m.sender === state.user.phone;
                    const sender = state.allUsers.find(u => u.phone === m.sender) || { username: 'user', name: 'Участник' };
                    return `<div class="msg ${isMe ? 'out' : 'in'}"><div class="msg-bubble">
                        ${!isMe ? `<div class="msg-sender">@${sender.username}</div>` : ''}
                        ${m.text}<div class="msg-time">${fTime(m.time)}${isMe ? ' ✓' : ''}</div></div></div>`;
                }).join('');
                setTimeout(() => ctr.scrollTop = ctr.scrollHeight, 50);
            }

            init();
            console.log('🔥 KChat v7 | Поиск по username работает!');
        })();
    </script>
</body>
</html>
