<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KChat Pro • Общение онлайн</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        :root {
            --bg: #ffffff;
            --bg2: #f0f2f5;
            --bg3: #f7f9fc;
            --text: #1a1a1a;
            --text2: #65676b;
            --blue: #0084ff;
            --green: #31a24c;
            --red: #ff4444;
            --orange: #ff9f43;
            --bubble-in: #e4e6eb;
            --bubble-out: #0084ff;
            --border: #dadde1;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            --bg: #1a1a1a;
            --bg2: #0a0a0a;
            --bg3: #2a2a2a;
            --text: #e4e6eb;
            --text2: #b0b3b8;
            --bubble-in: #3a3b3c;
            --border: #3e4042;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg2);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            font-size: 14px;
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes messageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Auth */
        .auth-screen {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .auth-card {
            background: var(--bg);
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .auth-card h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--text2);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text2);
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            background: var(--bg3);
            color: var(--text);
            outline: none;
            transition: all var(--transition);
        }

        .input-group input:focus {
            border-color: var(--blue);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
            margin-top: 8px;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 360px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        .profile-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
        }

        .profile-bar:hover {
            background: var(--bg3);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .profile-username {
            font-size: 0.8rem;
            color: var(--blue);
        }

        .online-count {
            font-size: 0.75rem;
            color: var(--green);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg3);
            border-radius: 20px;
            padding: 8px 12px;
            gap: 8px;
            border: 1px solid var(--border);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 0.9rem;
            color: var(--text);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 2px;
        }

        .chat-item:hover {
            background: var(--bg3);
        }

        .chat-item.active {
            background: var(--blue);
            color: white;
        }

        .chat-item-info {
            flex: 1;
            min-width: 0;
        }

        .chat-item-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .chat-item-msg {
            font-size: 0.8rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg2);
        }

        .chat-header {
            padding: 12px 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-title {
            flex: 1;
            font-weight: 700;
            font-size: 1rem;
        }

        .chat-subtitle {
            font-size: 0.75rem;
            color: var(--text2);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg3);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }

        .icon-btn:hover {
            background: var(--blue);
            color: white;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg {
            display: flex;
            max-width: 70%;
            animation: messageIn 0.3s ease;
        }

        .msg.in {
            align-self: flex-start;
        }

        .msg.out {
            align-self: flex-end;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-break: break-word;
        }

        .msg.in .msg-bubble {
            background: var(--bubble-in);
            color: var(--text);
        }

        .msg.out .msg-bubble {
            background: var(--bubble-out);
            color: white;
        }

        .msg-sender {
            font-size: 0.7rem;
            margin-bottom: 2px;
            color: var(--blue);
            font-weight: 600;
        }

        .msg-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .input-bar {
            padding: 12px 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.95rem;
            background: var(--bg3);
            color: var(--text);
            outline: none;
        }

        .input-bar input:focus {
            border-color: var(--blue);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text2);
        }

        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 12px;
        }

        .toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--bg);
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            z-index: 2000;
            border-left: 4px solid var(--blue);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideUp 0.3s ease;
            font-size: 0.9rem;
        }

        .toast.success { border-left-color: var(--green); }
        .toast.error { border-left-color: var(--red); }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s;
        }

        .modal {
            background: var(--bg);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: scaleIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.1rem;
        }

        .modal-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: var(--bg3);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .modal-close:hover {
            background: var(--red);
            color: white;
        }

        .user-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .user-list-item:hover {
            background: var(--bg3);
        }

        .contact-item.selected {
            background: var(--blue);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100%;
                width: 100%;
                z-index: 100;
                transition: left var(--transition);
            }
            .sidebar.open { left: 0; }
            .msg { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            // ========== ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ==========
            const SERVER_URL = 'https://kchat-server-h3f8.onrender.com';
            let socket;

            try {
                socket = io(SERVER_URL);
                console.log('🟢 Подключение к серверу...');
            } catch(e) {
                console.log('⚠️ Сервер недоступен, работаем локально');
                socket = null;
            }

            // ========== СОСТОЯНИЕ ==========
            const STORAGE_KEY = 'kchat_online';
            const DEMO_CODE = '12345';

            const state = {
                currentUser: null,
                users: {
                    '+79991112233': { phone: '+79991112233', name: '🤖 Бот', username: 'bot', avatar: '🤖', online: true, status: 'Всегда онлайн' },
                    '+79001234567': { phone: '+79001234567', name: 'Александр', username: 'alex', avatar: '😎', online: true, status: 'В сети' },
                    '+79161112233': { phone: '+79161112233', name: 'Мария', username: 'maria', avatar: '👩', online: true, status: 'На работе' },
                },
                chats: [],
                messages: {},
                currentChat: null,
                theme: 'light',
                onlineUsers: []
            };

            // ========== ИНИЦИАЛИЗАЦИЯ ==========
            function init() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (data.chats) state.chats = data.chats;
                        if (data.messages) state.messages = data.messages;
                        if (data.users) Object.assign(state.users, data.users);
                    } catch(e) {}
                }

                if (state.chats.length === 0) {
                    state.chats = [
                        { id: 'general', type: 'group', name: '🌍 Общий чат', avatar: '🌍', participants: [], unread: {}, pinned: true },
                        { id: 'c1', type: 'private', participants: ['+79001234567', '+79991112233'], unread: {}, pinned: false },
                    ];
                    state.messages['general'] = [
                        { id: 'm0', sender: 'system', text: 'Добро пожаловать в общий чат! Здесь все пользователи могут общаться.', time: Date.now(), type: 'text' }
                    ];
                    state.messages['c1'] = [
                        { id: 'm1', sender: '+79991112233', text: 'Привет! Я бот. Работает WebSocket!', time: Date.now() - 3600000, type: 'text' },
                    ];
                }

                if (state.theme === 'dark') document.body.classList.add('dark');
                
                // WebSocket события
                if (socket) {
                    socket.on('connect', () => {
                        console.log('✅ Подключен к серверу!');
                        if (state.currentUser) {
                            socket.emit('register', {
                                name: state.currentUser.name,
                                username: state.currentUser.username,
                                avatar: state.currentUser.avatar
                            });
                        }
                    });

                    socket.on('users:update', (users) => {
                        state.onlineUsers = users;
                        updateOnlineCount();
                    });

                    socket.on('message:new', (msg) => {
                        if (!state.messages['general']) state.messages['general'] = [];
                        state.messages['general'].push({
                            id: msg.id || Date.now().toString(),
                            sender: msg.fromId || 'remote',
                            text: msg.text,
                            time: msg.time || Date.now(),
                            type: 'text',
                            senderName: msg.from,
                            senderUsername: msg.username,
                            senderAvatar: msg.avatar
                        });
                        
                        if (state.currentChat === 'general') {
                            renderMessages();
                        }
                        renderChatList();
                    });

                    socket.on('user:joined', (user) => {
                        showToast(`${user.name} присоединился!`, 'success');
                    });

                    socket.on('user:left', (user) => {
                        showToast(`${user.name} вышел`, 'error');
                    });
                }

                render();
            }

            function saveState() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    chats: state.chats,
                    messages: state.messages,
                    users: state.users,
                    theme: state.theme
                }));
            }

            function showToast(message, type = 'info') {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();

                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span>${message}</span>`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            }

            function formatTime(ts) {
                const d = new Date(ts);
                const now = new Date();
                if (d.toDateString() === now.toDateString()) {
                    return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
                }
                return d.toLocaleDateString('ru', { day: '2-digit', month: '2-digit' });
            }

            function updateOnlineCount() {
                const el = document.getElementById('onlineCount');
                if (el) el.textContent = `🟢 Онлайн: ${state.onlineUsers.length}`;
            }

            // ========== RENDER ==========
            function render() {
                const app = document.getElementById('app');
                app.innerHTML = state.currentUser ? renderMain() : renderAuth();
                if (state.currentUser) {
                    attachMainEvents();
                    renderChatList();
                    updateOnlineCount();
                    if (state.currentChat) openChat(state.currentChat);
                } else {
                    attachAuthEvents();
                }
            }

            function renderAuth() {
                return `
                    <div class="auth-screen">
                        <div class="auth-card">
                            <h1>KChat</h1>
                            <p class="subtitle">Общайся с друзьями онлайн</p>
                            <div id="step1">
                                <div class="input-group">
                                    <label>📱 Номер телефона</label>
                                    <input type="tel" id="phoneInput" value="+79001234567" placeholder="+79001234567">
                                </div>
                                <button class="btn btn-primary" id="sendCodeBtn">📱 Получить код</button>
                                <button class="btn btn-outline" id="devLoginBtn">⚡ Быстрый вход</button>
                            </div>
                            <div id="step2" style="display:none;">
                                <p style="text-align:center;margin-bottom:12px;">Код: <b>${DEMO_CODE}</b></p>
                                <div class="input-group">
                                    <label>🔐 Код</label>
                                    <input type="text" id="codeInput" placeholder="12345" maxlength="5">
                                </div>
                                <button class="btn btn-primary" id="verifyCodeBtn">✅ Войти</button>
                            </div>
                            <div id="step3" style="display:none;">
                                <div class="input-group">
                                    <label>👤 Имя</label>
                                    <input type="text" id="nameInput" placeholder="Ваше имя">
                                </div>
                                <div class="input-group">
                                    <label>@ Username</label>
                                    <input type="text" id="usernameInput" placeholder="username">
                                </div>
                                <button class="btn btn-primary" id="registerBtn">🚀 Начать общение</button>
                            </div>
                        </div>
                    </div>`;
            }

            function attachAuthEvents() {
                let phoneVal = '';

                document.getElementById('sendCodeBtn')?.addEventListener('click', () => {
                    phoneVal = document.getElementById('phoneInput').value.trim();
                    if (!phoneVal) return showToast('Введите номер', 'error');
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                });

                document.getElementById('devLoginBtn')?.addEventListener('click', () => {
                    loginUser(document.getElementById('phoneInput').value.trim() || '+79001234567');
                });

                document.getElementById('verifyCodeBtn')?.addEventListener('click', () => {
                    if (document.getElementById('codeInput').value.trim() !== DEMO_CODE) {
                        return showToast('Код: 12345', 'error');
                    }
                    const phone = phoneVal || document.getElementById('phoneInput').value.trim();
                    if (state.users[phone]) {
                        loginUser(phone);
                    } else {
                        document.getElementById('step2').style.display = 'none';
                        document.getElementById('step3').style.display = 'block';
                    }
                });

                document.getElementById('registerBtn')?.addEventListener('click', () => {
                    const name = document.getElementById('nameInput').value.trim();
                    const username = document.getElementById('usernameInput').value.trim();
                    const phone = phoneVal || document.getElementById('phoneInput').value.trim();

                    if (!name) return showToast('Введите имя', 'error');
                    if (!username) return showToast('Введите username', 'error');

                    const newUser = {
                        phone, name, username,
                        avatar: ['😎','🐱','🦊','🐼','🤖'][Math.floor(Math.random() * 5)],
                        online: true, status: 'В сети'
                    };
                    state.users[phone] = newUser;
                    state.currentUser = newUser;

                    // Добавляем в общий чат
                    const generalChat = state.chats.find(c => c.id === 'general');
                    if (generalChat && !generalChat.participants.includes(phone)) {
                        generalChat.participants.push(phone);
                    }

                    saveState();

                    // Регистрируем на сервере
                    if (socket) {
                        socket.emit('register', { name, username, avatar: newUser.avatar });
                    }

                    render();
                    showToast(`Добро пожаловать, @${username}!`, 'success');
                });
            }

            function loginUser(phone) {
                const user = state.users[phone];
                if (user) {
                    user.online = true;
                    state.currentUser = user;

                    // Добавляем в общий чат
                    const generalChat = state.chats.find(c => c.id === 'general');
                    if (generalChat && !generalChat.participants.includes(phone)) {
                        generalChat.participants.push(phone);
                    }

                    saveState();

                    if (socket) {
                        socket.emit('register', {
                            name: user.name,
                            username: user.username,
                            avatar: user.avatar
                        });
                    }

                    render();
                    showToast(`С возвращением, @${user.username}!`, 'success');
                }
            }

            function renderMain() {
                const u = state.currentUser;
                return `
                    <div class="main-layout">
                        <div class="sidebar" id="sidebar">
                            <div class="sidebar-header">
                                <div class="profile-bar" id="profileBar">
                                    <div class="avatar">${u.avatar}</div>
                                    <div class="profile-info">
                                        <div class="profile-name">${u.name}</div>
                                        <div class="profile-username">@${u.username}</div>
                                        <div class="online-count" id="onlineCount">🟢 Онлайн: ${state.onlineUsers.length}</div>
                                    </div>
                                </div>
                                <div class="search-box">
                                    <i class="fas fa-search" style="color:var(--text2);"></i>
                                    <input type="text" id="searchChats" placeholder="Поиск...">
                                </div>
                            </div>
                            <div class="chat-list" id="chatList"></div>
                        </div>

                        <div class="chat-area">
                            <div class="chat-header">
                                <button class="icon-btn" id="menuToggleBtn" style="display:none;"><i class="fas fa-bars"></i></button>
                                <div class="avatar" id="chatAvatar" style="width:36px;height:36px;font-size:1.1rem;">💬</div>
                                <div style="flex:1;">
                                    <div class="chat-title" id="chatName">Выберите чат</div>
                                    <div class="chat-subtitle" id="chatStatus"></div>
                                </div>
                                <button class="icon-btn" id="themeToggleBtn"><i class="fas fa-moon"></i></button>
                                <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
                                <button class="icon-btn" id="logoutBtn" style="color:var(--red);"><i class="fas fa-sign-out-alt"></i></button>
                            </div>

                            <div class="messages-area" id="messagesArea">
                                <div class="empty-state">
                                    <i class="fas fa-comments"></i>
                                    <p>Выберите чат</p>
                                </div>
                            </div>

                            <div class="input-bar">
                                <input type="text" id="messageInput" placeholder="Сообщение...">
                                <button class="icon-btn" id="sendMsgBtn" style="background:var(--blue);color:white;">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
            }

            function attachMainEvents() {
                // Мобильное меню
                document.getElementById('menuToggleBtn')?.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('open');
                });

                // Профиль
                document.getElementById('profileBar')?.addEventListener('click', () => {
                    showToast(`@${state.currentUser.username} | ${state.onlineUsers.length} онлайн`, 'info');
                });

                // Тема
                document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
                    state.theme = state.theme === 'light' ? 'dark' : 'light';
                    document.body.classList.toggle('dark');
                    document.getElementById('themeToggleBtn').innerHTML = 
                        `<i class="fas ${state.theme === 'dark' ? 'fa-sun' : 'fa-moon'}"></i>`;
                    saveState();
                });

                // Выход
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    if (confirm('Выйти?')) {
                        state.currentUser = null;
                        state.currentChat = null;
                        saveState();
                        render();
                    }
                });

                // Настройки
                document.getElementById('settingsBtn')?.addEventListener('click', () => {
                    showToast('Настройки в разработке', 'info');
                });

                // Поиск
                document.getElementById('searchChats')?.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    document.querySelectorAll('.chat-item').forEach(item => {
                        const name = item.querySelector('.chat-item-name')?.textContent.toLowerCase() || '';
                        item.style.display = name.includes(q) ? 'flex' : 'none';
                    });
                });

                // Отправка сообщения
                const sendMsg = () => {
                    const input = document.getElementById('messageInput');
                    const text = input.value.trim();
                    if (!text || !state.currentChat) return;

                    const chat = state.chats.find(c => c.id === state.currentChat);
                    if (!chat) return;

                    const msg = {
                        id: generateId(),
                        sender: state.currentUser.phone,
                        text,
                        time: Date.now(),
                        type: 'text',
                        senderName: state.currentUser.name,
                        senderUsername: state.currentUser.username,
                        senderAvatar: state.currentUser.avatar
                    };

                    if (!state.messages[chat.id]) state.messages[chat.id] = [];
                    state.messages[chat.id].push(msg);

                    // Отправка через WebSocket если это общий чат
                    if (chat.id === 'general' && socket) {
                        socket.emit('message:send', { text });
                    }

                    // Ответ бота для личного чата
                    if (chat.participants.includes('+79991112233') && chat.type === 'private') {
                        setTimeout(() => {
                            const reply = {
                                id: generateId(),
                                sender: '+79991112233',
                                text: ['👍', 'Принято!', 'Ок', 'Интересно'][Math.floor(Math.random() * 4)],
                                time: Date.now(),
                                type: 'text'
                            };
                            state.messages[chat.id].push(reply);
                            saveState();
                            if (state.currentChat === chat.id) renderMessages();
                            renderChatList();
                        }, 1000);
                    }

                    saveState();
                    renderMessages();
                    renderChatList();
                    input.value = '';
                };

                document.getElementById('sendMsgBtn')?.addEventListener('click', sendMsg);
                document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMsg();
                });
            }

            // ========== СПИСОК ЧАТОВ ==========
            function renderChatList() {
                const container = document.getElementById('chatList');
                if (!container || !state.currentUser) return;

                const userPhone = state.currentUser.phone;
                let chats = state.chats.filter(c => {
                    if (c.id === 'general') return true;
                    return c.participants.includes(userPhone);
                });

                chats.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    const la = (state.messages[a.id] || []).slice(-1)[0];
                    const lb = (state.messages[b.id] || []).slice(-1)[0];
                    return (lb?.time || 0) - (la?.time || 0);
                });

                container.innerHTML = chats.map(chat => {
                    const isActive = chat.id === state.currentChat;
                    const display = getChatDisplay(chat, userPhone);
                    const msgs = state.messages[chat.id] || [];
                    const last = msgs[msgs.length - 1];
                    const preview = last ? (last.senderName || last.senderUsername || '') + ': ' + last.text : 'Нет сообщений';
                    const time = last ? formatTime(last.time) : '';

                    return `
                        <div class="chat-item ${isActive ? 'active' : ''}" data-chat="${chat.id}">
                            <div class="avatar" style="width:40px;height:40px;font-size:1.2rem;">${display.avatar}</div>
                            <div class="chat-item-info">
                                <div style="display:flex;justify-content:space-between;">
                                    <span class="chat-item-name">${chat.pinned ? '📌 ' : ''}${display.name}</span>
                                    <span style="font-size:0.65rem;color:var(--text2);">${time}</span>
                                </div>
                                <div class="chat-item-msg">${preview.substring(0, 30)}</div>
                            </div>
                        </div>`;
                }).join('');

                container.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => openChat(item.dataset.chat));
                });
            }

            function getChatDisplay(chat, userPhone) {
                if (chat.type === 'private') {
                    const other = chat.participants.find(p => p !== userPhone);
                    const u = state.users[other];
                    return { name: u?.name || 'Контакт', avatar: u?.avatar || '👤' };
                }
                return { name: chat.name, avatar: chat.avatar || '👥' };
            }

            function openChat(chatId) {
                state.currentChat = chatId;
                const chat = state.chats.find(c => c.id === chatId);
                if (!chat) return;

                const display = getChatDisplay(chat, state.currentUser.phone);
                document.getElementById('chatAvatar').textContent = display.avatar;
                document.getElementById('chatName').textContent = display.name;
                document.getElementById('chatStatus').textContent = chat.id === 'general' ? 
                    `${state.onlineUsers.length} онлайн` : '';

                renderMessages();
                renderChatList();

                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            }

            function renderMessages() {
                const container = document.getElementById('messagesArea');
                if (!container || !state.currentChat) return;

                const msgs = state.messages[state.currentChat] || [];

                if (msgs.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>Нет сообщений</p></div>';
                    return;
                }

                container.innerHTML = msgs.map(msg => {
                    const isMe = msg.sender === state.currentUser.phone;
                    const senderName = msg.senderName || state.users[msg.sender]?.name || 'Участник';

                    return `
                        <div class="msg ${isMe ? 'out' : 'in'}">
                            <div class="msg-bubble">
                                ${!isMe ? `<div class="msg-sender">${senderName}</div>` : ''}
                                ${msg.text}
                                <div class="msg-time">${formatTime(msg.time)}</div>
                            </div>
                        </div>`;
                }).join('');

                setTimeout(() => container.scrollTop = container.scrollHeight, 50);
            }

            // ========== ЗАПУСК ==========
            init();
            console.log('🚀 KChat Online готов! Общайтесь через общий чат!');
        })();
    </script>
</body>
</html>
